name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff mypy

      - name: Run ruff (linter)
        run: ruff check .

      - name: Run mypy (type checker)
        run: mypy lsh shared database --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: similarity_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        run: python -c "from database.database import init_db; init_db()"
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: similarity_db
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: similarity_db
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 7

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Producer image
        run: docker build -f producer/Dockerfile -t kafka-streaming:producer .

      - name: Build Consumer image
        run: docker build -f consumer/Dockerfile -t kafka-streaming:consumer .

      - name: Build Flask UI image
        run: docker build -f flask-ui/Dockerfile -t kafka-streaming:flask .
