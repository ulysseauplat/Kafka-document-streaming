version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: similarity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "similarity_db"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
    entrypoint: ["python", "-c", "from database.database import init_db; init_db(); print('Database initialized')"]
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo stat | nc localhost 2181"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-0:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-0
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 0
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_JVM_PERFORMANCE_OPTS: "-XX:MetaspaceSize=96m -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35 -XX:G1HeapRegionSize=16m -XX:MinMetaspaceFreeRatio=50 -XX:MaxMetaspaceFreeRatio=80"
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 8
    mem_limit: 768m

  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_JVM_PERFORMANCE_OPTS: "-XX:MetaspaceSize=96m -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35 -XX:G1HeapRegionSize=16m -XX:MinMetaspaceFreeRatio=50 -XX:MaxMetaspaceFreeRatio=80"
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 8
    mem_limit: 768m

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9093 --list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  create-topic:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka-0:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "echo 'Waiting for Kafka...' && \
       sleep 10 && \
       kafka-topics --create --if-not-exists \
         --bootstrap-server kafka-0:9092,kafka-1:9093 \
         --replication-factor 1 \
         --partitions 3 \
         --topic documents && \
       echo 'Topic created successfully'"

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: producer
    depends_on:
      create-topic:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: "kafka-0:9092,kafka-1:9093"
      SAMPLE_SIZE: "5000"
      CSV_FILE: "data/nyt-comments-sorted.csv"
    volumes:
      - ./data:/app/data
    mem_limit: 512m

  consumer-1:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: consumer-1
    depends_on:
      db-init:
        condition: service_completed_successfully
      create-topic:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: "kafka-0:9092,kafka-1:9093"
      CONSUMER_ID: "1"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "similarity_db"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_BUCKET: "kafka-stream-project-ulysse"
    mem_limit: 512m

  consumer-2:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: consumer-2
    depends_on:
      db-init:
        condition: service_completed_successfully
      create-topic:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: "kafka-0:9092,kafka-1:9093"
      CONSUMER_ID: "2"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "similarity_db"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_BUCKET: "kafka-stream-project-ulysse"
    mem_limit: 512m

  consumer-3:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: consumer-3
    depends_on:
      db-init:
        condition: service_completed_successfully
      create-topic:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: "kafka-0:9092,kafka-1:9093"
      CONSUMER_ID: "3"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "similarity_db"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_BUCKET: "kafka-stream-project-ulysse"
    mem_limit: 512m

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka-0
      - kafka-1
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-0:9092,kafka-1:9093"

  flask-ui:
    build:
      context: .
      dockerfile: flask-ui/Dockerfile
    container_name: flask-ui
    ports:
      - "5000:5000"
    environment:
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "similarity_db"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_BUCKET: "kafka-stream-project-ulysse"
    depends_on:
      db-init:
        condition: service_completed_successfully
    mem_limit: 256m

volumes:
  postgres_data:
